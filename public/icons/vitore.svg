<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <clipPath id="sq-vt"><rect x="0" y="0" width="120" height="120" rx="27"/></clipPath>
    <radialGradient id="vt-bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#123524"/>
      <stop offset="1" stop-color="#08130C"/>
    </radialGradient>
    <linearGradient id="vt-v" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D8FFC9"/>
      <stop offset="0.55" stop-color="#7BEF9E"/>
      <stop offset="1" stop-color="#2FBF6B"/>
    </linearGradient>
    <filter id="vt-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#sq-vt)">
    <rect width="120" height="120" fill="url(#vt-bg)"/>
    <!-- faint line-art veg -->
    <g stroke="#2E6B47" stroke-width="1.6" fill="none" opacity="0.5">
      <path d="M18 84 c-4 -8 2 -16 9 -15 c1 -6 10 -7 12 -1 c5 2 5 10 0 13 c-2 5 -9 7 -13 4 c-4 2 -7 1 -8 -1z"/><!-- broccoli head -->
      <path d="M27 85 l-1 8 M23 84 l-3 7 M31 84 l2 8" stroke-width="1.4"/>
      <path d="M96 74 c8 -1 12 6 11 13 c-1 8 -9 13 -15 10 c-6 -3 -7 -13 -2 -18 c2 -2 4 -4 6 -5z"/><!-- avocado -->
      <circle cx="99" cy="86" r="4"/>
      <path d="M20 26 c8 -6 16 -4 18 3 c-6 6 -14 6 -18 -3z"/><!-- leaf -->
      <path d="M22 25 c5 1 9 2 13 4" stroke-width="1.2"/>
      <path d="M92 24 c6 -5 13 -3 14 3 c-5 5 -11 4 -14 -3z"/>
    </g>
    <!-- vine curves on edges -->
    <path d="M6 40 C 14 52, 10 66, 5 76" stroke="#2E6B47" stroke-width="1.6" fill="none" opacity="0.45"/>
    <path d="M114 34 C 106 46, 110 60, 115 72" stroke="#2E6B47" stroke-width="1.6" fill="none" opacity="0.45"/>
    <!-- glowing leaf V -->
    <g filter="url(#vt-glow)">
      <path d="M38 34 C 44 56, 52 74, 60 88 C 62 76, 62 62, 58 46 C 52 38, 44 34, 38 34 Z" fill="url(#vt-v)"/>
      <path d="M88 28 C 86 52, 76 74, 61 89 C 60 74, 66 54, 74 42 C 78 35, 84 30, 88 28 Z" fill="url(#vt-v)"/>
    </g>
  </g>
</svg>
